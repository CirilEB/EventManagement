<!DOCTYPE html>
{% load static %}
<html dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Tell the browser to be responsive to screen width -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <meta name="author" content="">
    <!-- Favicon icon -->
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'Super/assets/images/favicon.png' %}">
    <title>Adminmart Template - The Ultimate Multipurpose admin template</title>
    <!-- Custom CSS -->
    <link href="{% static 'Super/dist/css/style.min.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
    <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
<![endif]-->
</head>

<body>
    <div class="main-wrapper">
        <!-- ============================================================== -->
        <!-- Preloader - style you can find in spinners.css -->
        <!-- ============================================================== -->
        <div class="preloader">
            <div class="lds-ripple">
                <div class="lds-pos"></div>
                <div class="lds-pos"></div>
            </div>
        </div>
        <!-- ============================================================== -->
        <!-- Preloader - style you can find in spinners.css -->
        <!-- ============================================================== -->
        <!-- ============================================================== -->
        <!-- Login box.scss -->
        <!-- ============================================================== -->
        <div class="auth-wrapper d-flex no-block justify-content-center align-items-center position-relative"
            style="background:url({% static 'Super/assets/images/big/auth-bg.jpg' %}) no-repeat center center;">
            <div class="auth-box row text-center">
                <div class="col-lg-7 col-md-5 modal-bg-img" style="background-image: url({% static 'Super/assets/images/big/3.jpg' %});">
                </div>
                <div class="col-lg-5 col-md-7 bg-white">
                    <div class="p-3">
                        <img src="{% static 'Super/assets/images/big/icon.png' %}" alt="wrapkit">
                        <h2 class="mt-3 text-center">Sign Up for Free</h2>
                        <form class="mt-4" method="post" onsubmit="return passwordValidation()" action="{% url 'save_signup' %}">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <input id="name" class="form-control" type="text" placeholder="your name" name="student_name" onblur="checkUsername()" required>
                                        <span id="nameError" style="color:red;"></span>
                                    </div>
                                </div>
                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <input class="form-control" type="email" placeholder="email address" name="student_email" required>
                                    </div>
                                </div>
                                <div class="col-lg-12">
                                    <div class="form-group">
                                        <input id="pass" class="form-control" type="password" placeholder="password" name="student_pass">
                                        <span onclick="togglePassword()" style="position:absolute;right:15px;top:18%;transform:translate(-50%);cursor:pointer;"><i class="icon-eye"></i></span>
                                        <span id="passError" style="color:red;"></span>
                                    </div>
                                </div>
                                <div class="col-lg-12 text-center">
                                    <button type="submit" class="btn btn-block btn-dark">Sign Up</button><br>
                                </div>
                                <div class="col-lg-12 text-center">
                                    Already have an account? <a href="{% url 'student_loginPage' %}" class="text-danger">Sign In</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- ============================================================== -->
        <!-- Login box.scss -->
        <!-- ============================================================== -->
    </div>
    <!-- ============================================================== -->
    <!-- All Required js -->
    <!-- ============================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    {% if messages %}
    <script>
    {% for m in messages %}
        Swal.fire({
            icon: "{{ m.tags }}",
            text: "{{ m }}",
            timer:3000,
            showConfirmButton: false
        });
    {% endfor %}
    </script>
    {% endif %}
    <script>
        function passwordValidation(){
            pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%?&#])[A-Za-z\d@$!%?&#]{8,}$/;
            let pass = document.getElementById("pass").value;
            let passError = document.getElementById("passError");
            if (!pattern.test(pass)){
                passError.innerText = "Password must have uppercase, lowercase, numbers, special characters and minimum of 8 characters";
                return false;
            }
            passError.innerText = "";
            return true;
        }
        function checkUsername(){
            let username = document.getElementById("name").value;
            let error = document.getElementById("nameError");
            if (username.trim() === ""){
                error.innerText = "Username Cannot be Empty";
                return;
            }
            fetch("/EventRegister/check_username/?username=" + encodeURIComponent(username))
                .then(res => res.json())
                .then(data =>{
                    if (data.exists){
                        error.innerText = "User already exists";
                    }else{
                        error.innerText = "";
                    }
                });
        }
        function togglePassword(){
         let password = document.getElementById("pass");
         if (password.type == "password"){
            password.type = "text";
         }else{
            password.type = "password";
         }
        }
    </script>
    <script src="{% static 'Super/assets/libs/jquery/dist/jquery.min.js' %} "></script>
    <!-- Bootstrap tether Core JavaScript -->
    <script src="{% static 'Super/assets/libs/popper.js/dist/umd/popper.min.js' %} "></script>
    <script src="{% static 'Super/assets/libs/bootstrap/dist/js/bootstrap.min.js' %} "></script>
    <!-- ============================================================== -->
    <!-- This page plugin js -->
    <!-- ============================================================== -->
    <script>
        $(".preloader ").fadeOut();
    </script>
</body>

</html>

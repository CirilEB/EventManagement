<!DOCTYPE html>
{% extends 'college_admin.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="col-sm-12 col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">Add New Event</h4><br>
                                <form action="{% url 'Save_event' %}" method="post" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <div class="form-body">
                                        <div class="row">
                                            <div class="col-md-12">
                                                <div class="form-group">
                                                    <input type="hidden" class="form-control" name="euname" value="{{ request.session.department }}"><br>
                                                    <input type="text" class="form-control" placeholder="Title" name="title" required><br>

                                                    <div class="form-group">
                                                        <textarea class="form-control" rows="3" placeholder="Description" name="description" required></textarea>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-12">
                                                <div class="input-group mb-3">
                                                <div class="input-group-prepend">
                                                    <label class="input-group-text">Event Type</label>
                                                </div>
                                                <select class="custom-select" id="" name="type" required>
                                                    <option value="" disabled selected hidden>Choose...</option>
                                                    <option value="Workshop">Workshop</option>
                                                    <option value="Internship">Internship</option>
                                                    <option value="Hackathon">Hackathon</option>
                                                </select>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-4">
                                                <div class="form-group">
                                                    <label>Start Date</label>
                                                    <input type="date" id="start" class="form-control" name="start" required onchange="setEndMin(); setDeadlineMax();">
                                                </div>
                                            </div>
                                             <div class="col-md-4">
                                                <div class="form-group">
                                                    <label>End Date</label>
                                                    <input type="date" id="end" class="form-control" name="end" required onchange="setStartMax();">
                                                </div>
                                            </div>
                                             <div class="col-md-4">
                                                <div class="form-group">
                                                    <label>Registration Dead Line</label>
                                                    <input type="date" id="deadline" class="form-control" name="dead" required onchange="setStartMin(); setEndMin();">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="input-group mb-3">
                                                <div class="input-group-prepend">
                                                    <label class="input-group-text">Mode</label>
                                                </div>
                                                <select class="custom-select" id="" name="mode" required>
                                                    <option value="" disabled selected hidden>Choose...</option>
                                                    <option value="Online">Online</option>
                                                    <option value="Offline">Offline</option>
                                                </select>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" class="form-control" placeholder="Location" name="location" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <input type="number" class="form-control" placeholder="Max Students" min="1" name="maxS" required>
                                            </div>
                                            <div class="col-md-6">
                                                <input type="text" class="form-control" placeholder="Registration Fee" name="fee" required>
                                            </div>
                                        </div><br>
                                        <div class="row">
                                            <div class="col-md-6">
                                                <div class="custom-file">
                                                        <input type="file" class="custom-file-input" id="" name="certificate" required>
                                                        <label class="custom-file-label">Insert Certificate Template</label>
                                                </div>
                                            </div>
                                            <div class="col-md-6">
                                                <div class="custom-file">
                                                        <input type="file" class="custom-file-input" id="" name="poster" required>
                                                        <label class="custom-file-label">Insert Brochure/Poster</label>
                                                </div>
                                            </div>
                                        </div><br>
                                    </div>
                                    <div class="form-actions">
                                        <div class="text-left">
                                            <button type="submit" class="btn btn-info">Submit</button>
                                            <button type="reset" class="btn btn-dark">Reset</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
    <script>
        window.onload = function(){
            let today = new Date().toISOString().split("T")[0];
            document.getElementById("deadline").min = today;
            document.getElementById("start").min = today;
            document.getElementById("end").min = today;
        };
        function setStartMin(){
            let deadline = document.getElementById("deadline").value;
            document.getElementById("start").min = deadline;
        }
        function setEndMin(){
            let start = document.getElementById("start").value;
            document.getElementById("end").min = start;
        }
        function setDeadlineMax(){
            let start = document.getElementById("start").value;
            document.getElementById("deadline").max = start;
        }
        function setStartMax(){
            let end = document.getElementById("end").value;
            document.getElementById("start").max = end;
        }
    </script>
</body>
</html>
{% endblock %}

<!DOCTYPE html>
{% extends 'super_admin.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <div class="col-lg-12">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">College List</h4><br>
                                <div class="table-responsive">
                                    <table class="table">
                                        <thead class="bg-info text-white">
                                            <tr>
                                                <th>Logo</th>
                                                <th>Name</th>
                                                <th>Address</th>
                                                <th>Email-ID</th>
                                                <th>Website</th>
                                                <th>Contact No.</th>
                                                <th>Options</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                        {% for i in college %}
                                            <tr>
                                                <td>
                                                    <img src="{{ i.logo.url }}" alt="" height="50px">
                                                </td>
                                                <td>{{ i.name }}</td>
                                                <td>{{ i.address }}</td>
                                                <td>{{ i.email }}</td>
                                                <td>{{ i.web }}</td>
                                                <td>{{ i.mob }}</td>
                                                <td>
                                                    <div style="display:flex;gap:10px;">
                                                    <a href="{% url 'edit_college' college_id=i.id %}" class="btn btn-success btn-rounded" style="color:white;"> Edit</a>
                                                    <a href="{% url 'delete_college' college_id=i.id %}" class="btn btn-danger btn-rounded" style="color:white;"> Delete</a>
                                                    </div>
                                                </td>
                                            </tr>
                                        {% endfor %}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
</body>
</html>
{% endblock %}

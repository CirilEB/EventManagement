<!DOCTYPE html>
{% extends 'super_admin.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
    <div class="col-lg-12">
                        <div class="card">
                            <div class="card-body">
                                <h4 class="card-title">Department List</h4><br>
                                <div class="table-responsive">
                                    <table class="table">
                                        <thead class="bg-info text-white">
                                            <tr>
                                                <th>Name</th>
                                                <th>Code</th>
                                                <th>Email-ID</th>
                                                <th>Contact No.</th>
                                                <th>Head of Department</th>
                                                <th>Options</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                        {% for i in college %}
                                            <tr>
                                                <td>{{ i.name }}</td>
                                                <td>{{ i.code }}</td>
                                                <td>{{ i.email }}</td>
                                                <td>{{ i.mob }}</td>
                                                <td>{{ i.hod }}</td>
                                                <td>
                                                    <div style="display:flex;gap:10px;">
                                                    <a href="{% url 'edit_college' college_id=i.id %}" class="btn btn-success btn-rounded" style="color:white;"> Edit</a>
                                                    <a href="#" onclick="confirmDelete('{% url 'delete_college' college_id=i.id %}'); return false;" class="btn btn-danger btn-rounded" style="color:white;"> Delete</a>
                                                    </div>
                                                </td>
                                            </tr>
                                        {% endfor %}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    {% if messages %}
    <script>
    {% for m in messages %}
        Swal.fire({
            icon: "{{ m.tags }}",
            title: "{{ m }}",
            timer:3000,
            showConfirmButton: false
        });
    {% endfor %}
    </script>
    {% endif %}
    <script>
        function confirmDelete(url){
            Swal.fire({
                title: "Are you sure?",
                icon: "warning",
                showCancelButton: true,
            }).then((result) => {
                if (result.isConfirmed){
                    window.location.href = url;
                }
            });
        }
    </script>
</body>
</html>
{% endblock %}
